name: Auto Deploy to CloudPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: 31.97.107.14
          username: rsbaladhikahusada
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 15m
          debug: true
          script: |
            # 1. Masuk ke direktori project
            cd /home/rsbaladhikahusada/htdocs/www.rsbaladhikahusada.com

            # 2. Mode Maintenance (Opsional tapi disarankan)
            php artisan down || true

            # 3. Update Source Code
            git config --global --add safe.directory "*"
            git fetch origin main
            git reset --hard origin/main
            
            # PROTEKSI: Jangan hapus .env dan folder storage/uploads
            git clean -fd -e .env -e storage/app/public

            # 4. Update Dependency Backend
            # Jika 'composer' tidak ditemukan, gunakan: /usr/local/bin/composer
            composer install --no-dev --optimize-autoloader

            # 5. Update Database
            php artisan migrate --force

            # 6. Build Frontend
            # Gunakan npm ci jika ada package-lock.json untuk install yang lebih cepat/bersih
            npm install
            npm run build

            # 7. Optimasi & Bersihkan Cache
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            # 8. Matikan Mode Maintenance
            php artisan up

            echo "Deployment Berhasil! 🚀"
